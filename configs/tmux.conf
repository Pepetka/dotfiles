# ==========================
# ===  General settings  ===
# ==========================

set -g default-terminal "screen-256color"
set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on
set-option -g focus-events on
set -gq allow-passthrough on
set -g visual-activity off
set -g extended-keys on
set -g extended-keys-format csi-u

unbind C-b
set -g prefix C-a

set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

# window monitoring
setw -g monitor-activity on
setw -g monitor-bell on

# ==========================
# ===   Key bindings     ===
# ==========================

unbind "\$" # rename-session
unbind ,    # rename-window
unbind %    # split-window -h
unbind '"'  # split-window
unbind &    # kill-window
unbind z    # zoom-pane
unbind [    # previous-window
unbind ]    # next-window

bind C-e new-window -n 'tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"Config reloaded\"'"
bind C-r source-file ~/.tmux.conf \; display "Config reloaded"

bind c new-window -c "#{pane_current_path}"
set-hook -g after-new-window 'command-prompt -I "#{window_name}" "rename-window '%%'"'

bind r command-prompt -I "#{window_name}" "rename-window '%%'"
bind R command-prompt -I "#{session_name}" "rename-session '%%'"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind + resize-pane -Z

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# ====================================
# ===         Copy mode            ===
# ====================================

bind v copy-mode

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# =====================================
# ===           Theme               ===
# =====================================

# Colors

bg="#181926"
fg="#cad3f5"
yellow="#eed49f"
cyan="#91d7e3"
darkblue="#333853"
green="#a6da95"
orange="#f5a97f"
violet="#b7bdf8"
magenta="#f5bde6"
blue="#8aadf4"
red="#ed8796"
transparent="default"

# =====================================
# ===    Appearence and status bar  ===
# =====================================

set -g mode-style "fg=$darkblue,bg=$orange"

# command line style
set -g message-style "fg=$orange,bg=$transparent"

# status line style
set -g status-style "fg=$cyan,bg=$transparent"

# window segments in status line
set -g window-status-separator " "
separator_powerline_left=""
separator_powerline_right=""

setw -g window-status-style "fg=$transparent,bg=$transparent,bold"
setw -g window-status-format "#[fg=$darkblue]$separator_powerline_left#[fg=$blue,bg=$darkblue]#{?window_bell_flag,#[fg=$red],#{?window_activity_flag,#[fg=$yellow],}}#W #[fg=$darkblue,bg=$blue]#{?window_bell_flag,#[bg=$red],#{?window_activity_flag,#[bg=$yellow],}} #I#[fg=$blue,bg=$transparent]#{?window_bell_flag,#[fg=$red],#{?window_activity_flag,#[fg=$yellow],}}$separator_powerline_right#[default]"
setw -g window-status-current-style "fg=$transparent,bg=$transparent,bold"
setw -g window-status-current-format "#[fg=$darkblue]$separator_powerline_left#[fg=$orange,bg=$darkblue]#W #[fg=$darkblue,bg=$orange] #I#[fg=$orange,bg=$transparent]$separator_powerline_right#[default]"

# when window has monitoring notification
setw -g window-status-activity-style "fg=$transparent,bg=$transparent,bold"
setw -g window-status-bell-style "fg=$transparent,bg=$transparent,bold"

# outline for active pane
setw -g pane-active-border-style "fg=$green"

# general status bar settings
set -g status on
set -g status-interval 2
set -g status-position top
set -g status-justify left
set -g status-right-length 100

wg_session="#[fg=$darkblue,bg=$red,bold] #S#[fg=$red,bg=$transparent]$separator_powerline_right#[default]"
wg_battery="#{battery_icon}#{battery_color_charge_fg} #{battery_percentage}#[fg=$darkblue,bg=$transparent]$separator_powerline_right#[default]"
wg_is_zoomed="#[fg=$cyan]#{?window_zoomed_flag, ,}#[default]"
wg_is_keys_off="#[fg=$fg,bg=$darkblue]#([ $(tmux show-option -qv key-table) = 'off' ] && echo 'OFF')#[default]"
wg_layout="#[fg=$violet,bg=$transparent,bold]$separator_powerline_left#[fg=$darkblue,bg=$violet] #[fg=$violet,bg=$darkblue] #(~/.tmux/keyboard.sh)#[fg=$darkblue,bg=$transparent]$separator_powerline_right#[default]"
wg_mem_cpu="#[fg=$magenta,bold]$separator_powerline_left#[bg=$magenta,fg=$darkblue] #[bg=$darkblue,fg=$magenta]   #{ram_percentage} |   #{cpu_percentage}#[fg=$darkblue,bg=$transparent]$separator_powerline_right#[default]"
wg_date_time="#[fg=$violet,bg=$transparent,bold]$separator_powerline_left#[fg=$darkblue,bg=$violet] #[fg=$violet,bg=$darkblue] %d.%m.%Y | %H:%M#[fg=$darkblue,bg=$transparent]$separator_powerline_right#[default]"
wg_test="#(~/workspace/dotfiles/shell/battery.sh)#[default]"

set -g status-left "$wg_session "
set -g status-right "$wg_is_keys_off #{prefix_highlight} $wg_is_zoomed $wg_layout $wg_mem_cpu $wg_date_time $wg_battery #{online_status}"

set -g @online_icon "#[fg=$green,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$green]󰖩 #[default]"
set -g @offline_icon "#[fg=$red,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$red]󰖪 #[default]"

set -g @batt_color_charge_primary_tier8 "$green"
set -g @batt_color_charge_primary_tier7 "$green"
set -g @batt_color_charge_primary_tier6 "$yellow"
set -g @batt_color_charge_primary_tier5 "$yellow"
set -g @batt_color_charge_primary_tier4 "$yellow"
set -g @batt_color_charge_primary_tier3 "$orange"
set -g @batt_color_charge_primary_tier2 "$orange"
set -g @batt_color_charge_primary_tier1 "$red"

set -g @batt_color_charge_secondary_tier8 "$darkblue"
set -g @batt_color_charge_secondary_tier7 "$darkblue"
set -g @batt_color_charge_secondary_tier6 "$darkblue"
set -g @batt_color_charge_secondary_tier5 "$darkblue"
set -g @batt_color_charge_secondary_tier4 "$darkblue"
set -g @batt_color_charge_secondary_tier3 "$darkblue"
set -g @batt_color_charge_secondary_tier2 "$darkblue"
set -g @batt_color_charge_secondary_tier1 "$darkblue"

set -g @batt_icon_charge_tier8 "#[fg=$green,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$green]󱊣 #[default]"
set -g @batt_icon_charge_tier7 "#[fg=$green,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$green]󱊣 #[default]"
set -g @batt_icon_charge_tier6 "#[fg=$yellow,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$yellow]󱊢 #[default]"
set -g @batt_icon_charge_tier5 "#[fg=$yellow,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$yellow]󱊢 #[default]"
set -g @batt_icon_charge_tier4 "#[fg=$yellow,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$yellow]󱊢 #[default]"
set -g @batt_icon_charge_tier3 "#[fg=$orange,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$orange]󱊡 #[default]"
set -g @batt_icon_charge_tier2 "#[fg=$orange,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$orange]󱊡 #[default]"
set -g @batt_icon_charge_tier1 "#[fg=$red,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$red]󰂎 #[default]"

set -g @batt_icon_status_charged "#[fg=$green,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$green]󰂄 #[default]"
set -g @batt_icon_status_charging "#[fg=$yellow,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$yellow]󰂄 #[default]"
set -g @batt_icon_status_discharging "#[fg=$orange,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$orange]󱟞 #[default]"
set -g @batt_icon_status_attached "#[fg=$green,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$green]󰂃 #[default]"
set -g @batt_icon_status_unknown "#[fg=$red,bg=$transparent]$separator_powerline_left#[fg=$darkblue,bg=$red]󰂑 #[default]"

set -g @prefix_highlight_output_prefix '['
set -g @prefix_highlight_output_suffix ']'
set -g @prefix_highlight_fg "$bg"
set -g @prefix_highlight_bg "$violet"
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr "fg=$bg,bg=$violet"

# ============================
# ===       Plugins        ===
# ============================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @vim_navigator_mapping_left "C-Left C-h"
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""
set -g @vim_navigator_prefix_mapping_clear_screen ""

# Run all plugins' scripts
run '~/.tmux/plugins/tpm/tpm'
